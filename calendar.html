<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/tokens.css?v=21">
  <link rel="stylesheet" href="css/calendar.css?v=1">

  <script defer src="config.js?v=21"></script>
  <script defer src="js/calendar.js?v=1"></script>
</head>
<body>

  <div id="race-cal" style="font-family:Arial,sans-serif;padding:0;margin-inline:100px;">
    <div id="er-filters" style="display:none;margin-bottom:16px;"></div>
    <div id="er-state" style="text-align:center;padding:40px 0;color:#555;font-size:14px;font-family:Arial,sans-serif;">
      <div class="er-spin" style="display:inline-block;width:18px;height:18px;border:2px solid #ddd;border-top-color:#F1592A;border-radius:50%;margin-bottom:8px;"></div><br>Loading events…
    </div>
    <div id="er-live" style="margin-bottom:16px;width:calc(100% - 48px);box-sizing:border-box;margin-left:24px;margin-right:24px;"></div>
    <div id="er-cards" style="display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;justify-content:center;"></div>
  </div>

</body>
</html>
